version: '3'
services:
  dav_elg_gg:
    build: .
    container_name: dav_elg_gg
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    environment:
      RADICALE_CONFIG_AUTH_TYPE: htpasswd
      RADICALE_CONFIG_AUTH_HTPASSWD_FILENAME: /config/users
      RADICALE_CONFIG_AUTH_HTPASSWD_ENCRYPTION: bcrypt
      RADICALE_CONFIG_STORAGE_HOOK: '(git status --porcelain | awk ''{print $$2}'' | /venv/bin/python3 /usr/local/bin/create_birthday_calendar.py || true) && git add -A && (git diff --cached --quiet || git -c user.email=radicale@elg.gg -c user.name=Radicale commit -m ''Changes by %(user)s'')'
    volumes:
      - ./data:/data
      - ./config/users:/config/users:ro
    healthcheck:
      test: curl -f http://127.0.0.1:5232 || exit 1
      interval: 30s
      retries: 3
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dav_elg_gg.rule=Host(`dav.elg.gg`)"
      - "traefik.http.routers.dav_elg_gg.entrypoints=web"
      - "traefik.http.routers.dav_elg_gg-secure.rule=Host(`dav.elg.gg`)"
      - "traefik.http.routers.dav_elg_gg-secure.entrypoints=websecure"
      - "traefik.http.routers.dav_elg_gg-secure.tls.certresolver=myresolver"
      - "traefik.http.services.dav_elg_gg.loadbalancer.server.port=5232"
    networks:
      - webnet

networks:
  webnet:
    external: true
